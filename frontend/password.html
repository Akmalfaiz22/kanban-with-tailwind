<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-[#fff]">
     <section style="background-image:url('https://media.istockphoto.com/id/1733671277/photo/curved-data-lines-with-shallow-depth-of-field-blue-technology-computer-network-abstract.jpg?b=1&s=612x612&w=0&k=20&c=hOz-wdfU03KcMwSvJ_kQn_vKdMfJnlZiRP52EWQU2p4=')" 
             class="bg-no-repeat bg-cover bg-center h-[100vh] flex items-center justify-center" >
            
      <div class="w-96 h-auto bg-black/40 backdrop-blur-md border rounded-md border-white/20 ">
        <h1 class="font-bold text-4xl text-center mt-4">Change Password</h1>
        <form action="" class="">
            <div class="mt-6">
            <label for="" class="ml-6 font-bold">Old Password</label>
            <br>
            <input type="password"  class="border-2 ml-6 w-80 p-2 border-white rounded-md" placeholder="Old Password" id="old-password">
            </div>

            <div class="mt-4">
            <label for="" class="ml-6 mt-4 font-bold">New Password</label>
            <br>
            <input type="password" class="border-2 ml-6 w-80 p-2 border-white rounded-md" placeholder="New Password" id="new-password">
            </div>
        </form>
        <button id="changeBtn" class="ml-6 font-bold mt-5 bg-[#5B4CF5] w-80 p-3 mb-4 rounded-md">Change Password</button>
      </div>
    </section>
    <script>
         const passwordChange = document.getElementById('changeBtn')
         const oldPassword = document.getElementById('old-password')
         const newPassword = document.getElementById('new-password')

         passwordChange.addEventListener("click", async() => {
            const data = {
                 oldPassword: oldPassword.value,
                 newPassword: newPassword.value
             };
           try {
             const response = await fetch(
                 "http://localhost:4000/api/v1/users/change-password",
                 {
                     method: "POST",
                     credentials: "include",
                     headers: {
                         "Content-Type": "application/json"
                     },
                     body: JSON.stringify(data)
                 }
             );
         
             const result = await response.json();
         
                 console.log(response.status);
                 console.log(result);
         
             if(response.ok){
                 oldPassword.value = ""
                 newPassword.value = ""
              
               location.href = "./index.html"
               alert('password change successfully')
             }
             
           } catch (error) {
             console.error(error);
           }
       
         });
         
    </script>
</body>
</html>
