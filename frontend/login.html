<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-[#fff]">
    <section style="background-image:url('https://media.istockphoto.com/id/1733671277/photo/curved-data-lines-with-shallow-depth-of-field-blue-technology-computer-network-abstract.jpg?b=1&s=612x612&w=0&k=20&c=hOz-wdfU03KcMwSvJ_kQn_vKdMfJnlZiRP52EWQU2p4=')" 
             class="bg-no-repeat bg-cover bg-center h-[100vh] flex items-center justify-center" >
            
      <div class="w-96 h-auto bg-black/40 backdrop-blur-md border rounded-md border-white/20 ">
        <h1 class="font-bold text-4xl text-center mt-4">Welcome Back!</h1>
        <form action="" class="">
            <div class="mt-6">
            <label for="" class="ml-6 font-bold">User Name</label>
            <br>
            <input type="text"  class="border-2 ml-6 w-80 p-2 border-white rounded-md" placeholder="Username" id="userName">
            </div>

            <div class="mt-4">
            <label for="" class="ml-6 mt-4 font-bold">Password</label>
            <br>
            <input type="password" class="border-2 ml-6 w-80 p-2 border-white rounded-md" placeholder="Password"  id="password">
            </div>
        </form>
        <button id="loginBtn" class="ml-6 font-bold mt-5 bg-[#5B4CF5] w-80 p-3 mb-4 rounded-md">LogIn</button>
      </div>
    </section>
    <script>
        const loginBtn = document.getElementById('loginBtn')
        const userName = document.getElementById('userName')
        const password = document.getElementById('password')
        loginBtn.addEventListener("click", async() => {
             const data = {
                userName: userName.value,
                password: password.value
            };
          try {
          const response = await fetch(
              "http://localhost:4000/api/v1/users/login",
              {
                  method: "POST",
                  credentials: "include",
                  headers: {
                "Content-Type": "application/json"
            },
                  body: JSON.stringify(data)
              }
          );
            
         console.log("Status:", response.status);

         const result = await response.json();

         console.log("Response:", result);
        //   const result = await response.json();
        //   console.log(result);
          if(response.ok){
              userName.value = ""
              password.value = ""
       
          location.href = "./index.html"
          }
          } catch (error) {
            console.error(error);
            alert("Please Enter your correct password")
          }      
        })
    </script>
</body>
</html>
